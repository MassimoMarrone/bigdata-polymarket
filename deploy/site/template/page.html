<!DOCTYPE html>
<html lang="{lang}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{title} — Polymarket × Social</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,600;1,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📈</text></svg>">
</head>
<body>

<header class="site">
  <div class="inner">
    <span class="brand"><b>polymarket</b>×social</span>
    <nav>
      <a href="/" class="{active_overview}">Overview</a>
      <a href="/report/" class="{active_report}">Report</a>
      <a href="/decisions/" class="{active_decisions}">Decisions</a>
      <a href="/setup/" class="{active_setup}">Setup</a>
      <a href="https://github.com/MassimoMarrone/bigdata-polymarket" rel="noopener">GitHub</a>
      <a href="/app/" class="cta">Live dashboard →</a>
    </nav>
  </div>
</header>

<main class="doc">
<span class="doclang">{langnote}</span>
{content}
</main>

<footer class="site">
  <div class="inner">
    <span>Massimo Marrone — Big Data Engineering 2025/26, Track 2</span>
    <a href="/">Overview</a>
    <a href="/app/">Live dashboard</a>
  </div>
</footer>

<!-- Le graffe sono raddoppiate: page.html passa per str.format() in build.py. -->
<script src="/vendor/mermaid.min.js"></script>
<script>
  // Palette allineata a style.css: il sito e' scuro, i diagrammi devono esserlo.
  mermaid.initialize({{
    startOnLoad: true,
    theme: 'base',
    themeVariables: {{
      fontFamily: "'IBM Plex Sans', system-ui, sans-serif",
      fontSize: '14px',
      background: '#0B1220',
      primaryColor: '#182236',
      primaryTextColor: '#E8ECF4',
      primaryBorderColor: '#5B9DFF',
      secondaryColor: '#131C2E',
      tertiaryColor: '#131C2E',
      mainBkg: '#182236',
      lineColor: '#8B96AB',
      textColor: '#E8ECF4',
      nodeBorder: '#223049',
      clusterBkg: '#0F1828',
      clusterBorder: '#223049',
      edgeLabelBackground: '#131C2E',
      // gantt
      taskBkgColor: '#182236',
      taskTextColor: '#E8ECF4',
      taskTextOutsideColor: '#E8ECF4',
      taskTextDarkColor: '#0B1220',
      activeTaskBkgColor: '#5B9DFF',
      activeTaskBorderColor: '#5B9DFF',
      doneTaskBkgColor: '#6FD3A3',
      doneTaskBorderColor: '#6FD3A3',
      critBkgColor: '#E06C6C',
      critBorderColor: '#E06C6C',
      gridColor: '#223049',
      sectionBkgColor: '#131C2E',
      sectionBkgColor2: '#0F1828',
      altSectionBkgColor: '#0F1828',
      titleColor: '#E8ECF4'
    }},
    flowchart: {{ htmlLabels: true, curve: 'basis' }},
    gantt: {{ barHeight: 24, fontSize: 13, leftPadding: 170 }}
  }});
</script>

</body>
</html>
