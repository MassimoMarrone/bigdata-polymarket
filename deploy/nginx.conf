server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml text/html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /shots/ {
        expires 7d;
    }

    # Deliverable 2 (dataset). Contiene testi e nomi di account reali: raggiungibile
    # con l'URL diretto, ma fuori dai motori di ricerca e non linkato dal sito.
    # Montato come volume (24 MB: non ha senso metterlo nell'immagine).
    location /dataset/ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Content-Disposition "attachment" always;
        autoindex off;
        expires -1;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /dataset/\n";
    }

    # Streamlit dietro /app: serve il supporto WebSocket e timeout lunghi,
    # altrimenti la sessione cade dopo 60s di inattivita.
    location /app/ {
        proxy_pass http://polymarket-dashboard:8501/app/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location = /app {
        return 301 /app/;
    }
}
