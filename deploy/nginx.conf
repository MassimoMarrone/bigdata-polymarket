server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml text/html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /shots/ {
        expires 7d;
    }

    # Streamlit dietro /app: serve il supporto WebSocket e timeout lunghi,
    # altrimenti la sessione cade dopo 60s di inattivita.
    location /app/ {
        proxy_pass http://polymarket-dashboard:8501/app/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location = /app {
        return 301 /app/;
    }
}
